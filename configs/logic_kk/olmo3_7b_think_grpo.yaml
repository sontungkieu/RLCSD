method: grpo
model_path: allenai/Olmo-3-7B-Think
use_lora: false

learning_rate: 1e-6
num_epochs: 30
per_device_batch_size: 8
group_size: 8
ppo_mini_batch_size: 16
max_grad_norm: 1.0
warmup_steps: 50
weight_decay: 0.01
max_train_samples: 60000
save_steps: 50
eval_steps: 50
logging_steps: 5
rollout_is: token
rollout_is_threshold: 2.0

max_prompt_length: 2048
max_completion_length: 16384
val_max_completion_length: 38912
temperature: 1.0
top_p: 0.95
top_k_sampling: 20
student_enable_thinking: true
val_enable_thinking: true
val_do_sample: true
val_n: 1
val_temperature: 0.6
val_top_p: 0.95
val_top_k: 20
val_batch_size: 16

vllm_gpu_memory_utilization: 0.6
vllm_tensor_parallel_size: 1

output_dir: ./outputs/logic_kk/Olmo3-7B-Think/grpo
data_dir: ./data
train_dataset: kk_4to8
val_dataset: kk_4to8_test,kk_9,kk_10,kk_11
use_swanlab: true
project_name: rlcsd-olmo3_7b_think-logic_kk
experiment_name: olmo3_7b_think_grpo
val_before_train: true
